name = "clientes-sync"
main = "src/index.js"
compatibility_date = "2026-04-01"

[vars]
ADMIN_ORIGINS = "https://sartorialab.github.io"

# Secrets (configurados via `wrangler secret put`):
#   SERVICE_ACCOUNT_JSON — conteudo do JSON do service account do Firebase
#   SHARED_SECRET        — token aleatorio que o bookmarklet envia no body
#   GOOGLE_CLIENT_ID     — OAuth client do Google Cloud Console
#   GOOGLE_CLIENT_SECRET — OAuth client secret
#   FIREBASE_API_KEY     — Web API key do Firebase (Project settings)
